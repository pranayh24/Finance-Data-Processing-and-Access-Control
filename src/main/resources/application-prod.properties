# ── Cloud Run + Cloud SQL Production Profile ──────────────
# Activate with: SPRING_PROFILES_ACTIVE=prod

# Cloud SQL connection (uses Unix socket via Cloud SQL Auth Proxy built into Cloud Run)
spring.cloud.gcp.sql.database-name=${DB_NAME:finance_db}
spring.cloud.gcp.sql.instance-connection-name=${CLOUD_SQL_INSTANCE}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT — set a strong secret as an env var in Cloud Run
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Server
server.port=${PORT:8080}

# Logging
logging.level.com.finance.dashboard=INFO
logging.level.org.springframework.security=WARN
