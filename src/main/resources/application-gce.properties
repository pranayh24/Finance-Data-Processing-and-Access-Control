# ── Compute Engine Profile (reuses Supabase PostgreSQL) ──
# Activate with: SPRING_PROFILES_ACTIVE=gce

# Datasource — connects to supabase-db container via Docker network
spring.datasource.url=jdbc:postgresql://${DB_HOST:supabase-db}:${DB_PORT:5432}/${DB_NAME:finance_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Server
server.port=8080

# Logging
logging.level.com.finance.dashboard=INFO
logging.level.org.springframework.security=WARN
